apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-master1
  namespace: odf-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-master1
  template:
    metadata:
      labels:
        app: busybox-master1
    spec:
      nodeSelector:
        kubernetes.io/hostname: master1.rhtnf.tnf.local
      containers:
        - name: busybox
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: shared-data
              mountPath: /shared
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: cephfs-busybox-pvc
