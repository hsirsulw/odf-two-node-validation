apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-master2
  namespace: odf-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-master2
  template:
    metadata:
      labels:
        app: busybox-master2
    spec:
      nodeName: master2
      containers:
        - name: busybox
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: shared-data
              mountPath: /shared
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: cephfs-busybox-pvc
